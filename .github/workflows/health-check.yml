name: Keep PenguinX Awake

on:
  schedule:
    - cron: "*/5 * * * *"    # every 5 minutes (UTC)
  workflow_dispatch:        # manual trigger allowed

concurrency:
  group: keep-penguinx-awake
  cancel-in-progress: true

jobs:
  ping-health:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Setup
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq

      - name: Ping health endpoint with retries
        env:
          URL: https://penguinx.onrender.com/health
          MAX_ATTEMPTS: 8        # total tries (adjust if you want more retries)
          SLEEP_SECONDS: 10     # seconds between tries
          # If you prefer the job to never fail (just keep waking), set FORCE_SUCCESS=true
          FORCE_SUCCESS: true
        run: |
          set -euo pipefail
          attempts=0

          echo "Starting keep-awake loop for $URL"
          while [ $attempts -lt "$MAX_ATTEMPTS" ]; do
            attempts=$((attempts + 1))
            echo "Attempt #$attempts..."

            # Fetch status + body, keep both
            # -s silent, -S show errors, -m 15 timeout
            raw=$(curl -sS -m 15 -H "Accept: application/json, text/html;q=0.9" -w "\n%{http_code}" "$URL" || true)
            http_code=$(echo "$raw" | tail -n1)
            body=$(echo "$raw" | sed '$d' || true)

            echo "HTTP code: $http_code"

            if [ "$http_code" = "200" ]; then
              # If body is valid JSON and contains status:"ok", consider fully healthy
              if echo "$body" | jq -e . >/dev/null 2>&1; then
                status=$(echo "$body" | jq -r '.status // empty' || true)
                timestamp=$(echo "$body" | jq -r '.timestamp // empty' || true)
                echo "Received JSON body. status=$status timestamp=$timestamp"
                if [ "$status" = "ok" ]; then
                  echo "✅ Service healthy and awake."
                  exit 0
                else
                  echo "200 and JSON, but status != ok. This may still wake the app."
                  # treat as success for wake-up (break out)
                  exit 0
                fi
              else
                # Not JSON — likely Render's "starting" HTML page; this still counts as traffic to wake the app.
                echo "200 but response is not JSON. Likely Render 'waking' HTML (OK for wake)."
                # Return success because our goal is to keep it awake; change to `break` or `exit 0` as desired.
                exit 0
              fi
            else
              echo "Not 200 (got $http_code). Will retry after ${SLEEP_SECONDS}s."
            fi

            sleep "$SLEEP_SECONDS"
          done

          echo "Reached max attempts ($MAX_ATTEMPTS)."

          if [ "${FORCE_SUCCESS:-false}" = "true" ]; then
            echo "FORCE_SUCCESS=true — exiting 0 to avoid alerts; the repeated pings still counted as traffic to Render."
            exit 0
          else
            echo "Exiting 1 to signal failure (no 200 received after retries)."
            exit 1
          fi
